<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA fix: store the path and redirect to index
      var path = window.location.pathname.replace('/DevStore', '') || '/';
      sessionStorage.setItem('spa_redirect', path + window.location.search + window.location.hash);
      window.location.replace('/DevStore/');
    </script>
  </head>
  <body></body>
</html>
